services:
  backend:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./python-api/app:/app/app
      - classroom_db:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/classroom_emotions.db}
    env_file:
      - .env

  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      - API_URL=${API_URL:-http://backend:8000}
      - VIDEO_SOURCE=${VIDEO_SOURCE:-0}
    env_file:
      - .env

  frontend:
    # Path A: R Shiny Dashboard
    image: rocker/shiny:latest
    ports:
      - "3838:3838"
    volumes:
      - ./frontend:/srv/shiny-server
    depends_on:
      - backend
    env_file:
      - .env

volumes:
  classroom_db:
