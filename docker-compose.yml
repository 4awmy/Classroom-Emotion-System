services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - classroom_db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/classroom_emotions.db

  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000

  frontend:
    # Path A: R Shiny Dashboard
    image: rocker/shiny:latest
    ports:
      - "3838:3838"
    volumes:
      - ./frontend:/srv/shiny-server
    depends_on:
      - backend

volumes:
  classroom_db:
