name: classroomx
region: fra
services:
  - name: backend
    github:
      repo: 4awmy/Classroom-Emotion-System
      branch: deploy-ready
      deploy_on_push: true
    dockerfile_path: python-api/Dockerfile
    source_dir: python-api
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
      - path: /docs
      - path: /openapi.json
      - path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${dev-db-617746.DATABASE_URL}
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production
      - key: JWT_SECRET
        scope: RUN_TIME
        value: aast-lms-secret-2026

  - name: frontend
    github:
      repo: 4awmy/Classroom-Emotion-System
      branch: deploy-ready
      deploy_on_push: true
    source_dir: shiny-app
    dockerfile_path: shiny-app/Dockerfile 
    http_port: 3838
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: ${backend.PUBLIC_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${dev-db-617746.DATABASE_URL}

databases:
  - name: dev-db-617746
    engine: PG
    version: "17"
