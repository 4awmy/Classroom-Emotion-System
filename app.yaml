name: classroom-emotion-system
region: nyc
services:
  - name: backend
    github:
      repo: omarh/Classroom-Emotion-System
      branch: main
      deploy_on_push: true
    dockerfile_path: python-api/Dockerfile
    source_dir: python-api
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_REGION
        scope: RUN_TIME
        value: nyc3
      - key: SPACES_BUCKET
        scope: RUN_TIME
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://nyc3.digitaloceanspaces.com

  - name: frontend
    github:
      repo: omarh/Classroom-Emotion-System
      branch: main
      deploy_on_push: true
    source_dir: shiny-app
    dockerfile_path: shiny-app/Dockerfile 
    http_port: 3838
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: ${backend.PUBLIC_URL}
      - key: SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_REGION
        scope: RUN_TIME
        value: nyc3
      - key: SPACES_BUCKET
        scope: RUN_TIME
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://nyc3.digitaloceanspaces.com

  - name: vision
    github:
      repo: omarh/Classroom-Emotion-System
      branch: main
      deploy_on_push: true
    dockerfile_path: vision/Dockerfile
    source_dir: vision
    instance_count: 1
    instance_size_slug: basic-m
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: ${backend.PUBLIC_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: VIDEO_SOURCE
        scope: RUN_TIME
        value: "0"

databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1
